  <style>
    html {
      font-size: 12px;
    }

    body {
      background-color: #fafaf9;
      /* stone-50 */
      color: #1c1917;
      /* stone-900 */
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
    }

    /* Body text — Poppins */
    p,
    li,
    span,
    label,
    small,
    input,
    textarea,
    select,
    button {
      font-family: 'Poppins', sans-serif;
    }

    /* Headings stay Playfair Display — NOT touched */
    h1,
    h2,
    h3 {
      font-family: 'Playfair Display', serif;
    }

    /* Only apply italic by default to the serif headings, not to Poppins or other specific families */
    h1:not(.font-poppins):not(.font-sans):not(.font-display):not(.font-manrope),
    h2:not(.font-poppins):not(.font-sans):not(.font-display):not(.font-manrope),
    h3:not(.font-poppins):not(.font-sans):not(.font-display):not(.font-manrope) {
      font-style: italic;
    }

    /* Hide scrollbar for clean aesthetic */
    ::-webkit-scrollbar {
      display: none;
    }

    /* For Firefox */
    * {
      scrollbar-width: none;
    }

    /* For IE and Edge */
    * {
      -ms-overflow-style: none;
    }

    /* Device Restriction Overlay */
    @media (max-width: 767px) {
      body::before {
        content: "Experience YOG-SAMSKARA on Desktop or Tablet";
        position: fixed;
        inset: 0;
        background: #0B0B0D;
        color: white;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1.5rem;
        letter-spacing: 0.05em;
      }

      #root {
        display: none !important;
      }
    }
  </style>
